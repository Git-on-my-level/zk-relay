name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Import release signing key
        env:
          ZK_RELAY_GPG_PRIVATE_KEY: ${{ secrets.ZK_RELAY_GPG_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$ZK_RELAY_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --with-colons | grep '^fpr:'

      - name: Build and sign receiver
        env:
          ZK_RELAY_GPG_KEY: ${{ secrets.ZK_RELAY_GPG_KEY }}
          ZK_RELAY_GPG_PASSPHRASE: ${{ secrets.ZK_RELAY_GPG_PASSPHRASE }}
        run: ./scripts/build-tools.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/tools/"${GITHUB_REF_NAME}"/zkr-* \
            dist/tools/"${GITHUB_REF_NAME}"/checksums.txt \
            dist/tools/"${GITHUB_REF_NAME}"/SHA256SUMS \
            dist/tools/"${GITHUB_REF_NAME}"/SHA256SUMS.asc \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
